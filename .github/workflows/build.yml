name: Build Extension

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run Build
      run: npm run build

    - name: Zip Extension
      run: |
        cd dist
        zip -r ../mf-subscription-checker.zip ./*

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: mf-subscription-checker-package
        path: mf-subscription-checker.zip
        retention-days: 90
