name: Build Extension

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run Lint and Format Check
      run: npm run check

    - name: Run Unit Tests
      run: node tests/run-tests.js

    - name: Run Build
      run: npm run build

    - name: Prepare Artifact
      run: |
        mkdir -p artifact
        mv dist artifact/

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: mf-subscription-checker-package
        path: artifact/
        retention-days: 90
