<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <title>MoneyForward Toolpack</title>
    <style>
    /* カラーパレットとレイアウト変数 */
    :root {
      --bg:
        radial-gradient(
          120% 140% at 10% 20%,
          #eef3ff 0%,
          #e6edff 35%,
          #eaf4ff 65%,
          #dfe8ff 100%
        ),
        radial-gradient(
          140% 140% at 90% 10%,
          rgba(88, 130, 255, 0.18),
          transparent 60%
        );
      --panel: rgba(255, 255, 255, 0.9);
      --border: rgba(62, 92, 255, 0.18);
      --shadow: 0 18px 40px rgba(27, 50, 120, 0.15);
      --text: #0f1a3d;
      --muted: #4a5775;
      --accent: linear-gradient(120deg, #6c8bff, #3d6bff 50%, #2e54ff 100%);
      --accent-strong: #2f4fff;
      --ok: #0f9d58;
      --warn: #c0392b;
      --radius: 14px;
      color-scheme: light;
    }

    /* 軽量リセット */
    * {
      box-sizing: border-box;
    }

    /* ポップアップ全体のベース */
    body {
      min-width: 260px;
      max-width: 360px;
      padding: 16px;
      margin: 0;
      font-family:
        "Space Grotesk", "Noto Sans JP", "Hiragino Sans", "BIZ UDGothic",
        sans-serif;
      color: var(--text);
      background: var(--bg);
    }

    /* メインパネル */
    .panel {
      padding: 16px 16px 14px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    /* ヘッダー（タイトルとバッジ） */
    header.hero {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 10px;
    }

    .badge {
      display: inline-flex;
      gap: 6px;
      align-items: center;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 600;
      color: #fff;
      letter-spacing: 0.02em;
      background: var(--accent);
      border-radius: 999px;
      box-shadow: 0 10px 25px rgba(46, 84, 255, 0.25);
    }

    h1 {
      margin: 0;
      font-size: 17px;
      line-height: 1.3;
      letter-spacing: 0.01em;
    }

    .hero-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin: 0 0 12px;
    }

    .pill {
      display: inline-flex;
      gap: 6px;
      align-items: center;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 600;
      color: #1f2e68;
      letter-spacing: 0.02em;
      background: #f2f4ff;
      border-radius: 999px;
    }

    /* Geminiの状態表示 */
    .pill.status {
      color: var(--ok);
      background: rgba(15, 157, 88, 0.14);
      border: 1px solid rgba(15, 157, 88, 0.2);
    }

    .pill.status.is-off {
      color: var(--warn);
      background: rgba(192, 57, 43, 0.12);
      border: 1px solid rgba(192, 57, 43, 0.2);
    }

    p {
      margin: 0 0 14px;
      font-size: 13px;
      line-height: 1.5;
      color: var(--muted);
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    button {
      width: 100%;
      padding: 12px 14px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      border: none;
      border-radius: 10px;
      transition:
        transform 120ms ease,
        box-shadow 120ms ease,
        background 180ms ease;
    }

    button:focus-visible {
      outline: 2px solid #2f4fff;
      outline-offset: 2px;
    }

    #openOptions {
      color: #fff;
      background: var(--accent);
      box-shadow: 0 12px 28px rgba(46, 84, 255, 0.28);
    }

    #openOptions:hover {
      transform: translateY(-1px);
    }

    #rerunGemini {
      color: var(--accent-strong);
      background: #f5f7ff;
      border: 1px solid var(--border);
    }

    #rerunGemini:hover:not(:disabled) {
      background: #eef2ff;
      transform: translateY(-1px);
    }

    #rerunGemini:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    .hint {
      margin-top: 8px;
      font-size: 11.5px;
      color: var(--muted);
      text-align: center;
    }
    </style>
  </head>
  <body>
    <div class="panel" role="presentation">
      <header class="hero">
        <span aria-hidden="true" class="badge">AI Assist</span>
        <h1 aria-label="MoneyForward Toolpack">MoneyForward Toolpack</h1>
      </header>
      <div class="hero-meta">
        <span class="pill" aria-hidden="true">家計簿 / サブスク可視化</span>
        <span id="geminiStatus" class="pill status" role="status"
          >Gemini ON</span
        >
      </div>
      <p>
        家計簿ページをAIで解析し、サブスク候補を賢く管理。設定変更や再解析はここからすぐに実行できます。
      </p>
      <div class="actions">
        <button id="openOptions" type="button">設定を開く</button>
        <button id="rerunGemini" type="button">このページで再解析</button>
      </div>
      <div class="hint">固定費の見直しをシンプルに。</div>
    </div>
    <script type="module" src="./index.js" defer></script>
  </body>
</html>
